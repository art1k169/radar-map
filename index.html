<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Radar Live Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #0b0e14; color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; }
        #map { flex-grow: 1; background: #0b0e14; }
        #sidebar { width: 320px; background: #12161f; border-left: 2px solid #1f2633; display: flex; flex-direction: column; }
        .header { padding: 15px; background: #1a202c; text-align: center; color: #4a9eff; font-weight: bold; border-bottom: 1px solid #2d3748; }
        #log-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .log-entry { background: #1c2331; padding: 10px; margin-bottom: 8px; border-radius: 5px; border-left: 3px solid #4a9eff; font-size: 13px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .target-container { position: relative; text-align: center; }
        .target-icon { width: 32px; height: 32px; }
        .target-label { position: absolute; top: -15px; width: 100%; color: yellow; font-weight: bold; text-shadow: 1px 1px 2px black; font-size: 18px; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="sidebar">
    <div class="header">RADAR MONITORING</div>
    <div id="log-list"></div>
</div>

<script>
    const SERVER_URL = 'https://radar-backend-2csp.onrender.com';
    const map = L.map('map', { center: [49.0, 31.0], zoom: 6, zoomControl: false });
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const markers = {};

    function createCustomIcon(text) {
        let isUnknown = text.includes('невідомий бпла');
        let img = isUnknown ? 'разведчик.png' : 'drone.png';
        let label = isUnknown ? '?' : '';

        return L.divIcon({
            className: 'target-marker',
            html: `<div class="target-container">
                    <div class="target-label">${label}</div>
                    <img src="${img}" class="target-icon">
                   </div>`,
            iconSize: [32, 32],
            iconAnchor: [16, 16]
        });
    }

    function animateMovement(marker, start, end, duration = 60000) {
        const startTime = performance.now();

        function frame(now) {
            const progress = Math.min((now - startTime) / duration, 1);
            const lat = start[0] + (end[0] - start[0]) * progress;
            const lng = start[1] + (end[1] - start[1]) * progress;
            
            marker.setLatLng([lat, lng]);

            if (progress < 1) {
                requestAnimationFrame(frame);
            } else {
                setTimeout(() => { map.removeLayer(marker); }, 60000); // Удалить через минуту после финиша
            }
        }
        requestAnimationFrame(frame);
    }

    const socket = io(SERVER_URL);

    socket.on('update_target', (data) => {
        if (markers[data.id]) map.removeLayer(markers[data.id]);
        
        const marker = L.marker(data.start_pos, { icon: createCustomIcon(data.text) }).addTo(map);
        markers[data.id] = marker;
        
        // Время полета зависит от дистанции, но тут поставим 2 минуты (120000 мс) для плавности
        animateMovement(marker, data.start_pos, data.end_pos, 120000);
    });

    socket.on('new_log', (data) => {
        const list = document.getElementById('log-list');
        const item = document.createElement('div');
        item.className = 'log-entry';
        item.innerHTML = `<small style="color:#718096">${data.time}</small><br>${data.text}`;
        list.insertBefore(item, list.firstChild);
    });

    // Первичная подгрузка
    fetch(`${SERVER_URL}/get_init_data`)
        .then(r => r.json())
        .then(data => {
            data.messages.forEach(m => socket.emit('new_log', m));
        });
</script>
</body>
</html>
