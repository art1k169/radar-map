<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Radar Live Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #0b0e14; color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; }
        #map { flex-grow: 1; background: #0b0e14; }
        #sidebar { width: 320px; background: #12161f; border-left: 2px solid #1f2633; display: flex; flex-direction: column; }
        .header { padding: 15px; background: #1a202c; text-align: center; color: #4a9eff; font-weight: bold; border-bottom: 1px solid #2d3748; }
        #log-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .log-entry { background: #1c2331; padding: 10px; margin-bottom: 8px; border-radius: 5px; border-left: 3px solid #4a9eff; font-size: 13px; }
        .target-container { position: relative; text-align: center; }
        .target-icon { width: 32px; height: 32px; filter: drop-shadow(0 0 5px rgba(255,0,0,0.5)); }
        .target-label { position: absolute; top: -18px; width: 100%; color: #ffeb3b; font-weight: bold; font-size: 20px; text-shadow: 2px 2px 4px black; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="sidebar">
    <div class="header">RADAR MONITORING</div>
    <div id="log-list"></div>
</div>

<script>
    const SERVER_URL = 'https://radar-backend-2csp.onrender.com';
    const map = L.map('map', { center: [49.0, 31.0], zoom: 6, zoomControl: false });
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const markers = {};

    function createCustomIcon(targetData) {
        // Выбираем файл на основе типа объекта
        let imgFile = targetData.type === 'разведчик' ? 'разведчик.png' : 'шахед.png';
        let label = targetData.type === 'разведчик' ? '?' : '';

        return L.divIcon({
            className: 'target-marker',
            html: `<div class="target-container">
                    <div class="target-label">${label}</div>
                    <img src="${imgFile}" class="target-icon">
                   </div>`,
            iconSize: [32, 32],
            iconAnchor: [16, 16]
        });
    }

    function animateMovement(marker, start, end, duration = 120000) {
        const startTime = performance.now();
        function frame(now) {
            const progress = Math.min((now - startTime) / duration, 1);
            const lat = start[0] + (end[0] - start[0]) * progress;
            const lng = start[1] + (end[1] - start[1]) * progress;
            marker.setLatLng([lat, lng]);
            if (progress < 1) requestAnimationFrame(frame);
            else setTimeout(() => { if(map.hasLayer(marker)) map.removeLayer(marker); }, 60000);
        }
        requestAnimationFrame(frame);
    }

    const socket = io(SERVER_URL);

    socket.on('update_target', (data) => {
        if (markers[data.id]) map.removeLayer(markers[data.id]);
        
        const marker = L.marker(data.start_pos, { icon: createCustomIcon(data) }).addTo(map);
        markers[data.id] = marker;
        
        animateMovement(marker, data.start_pos, data.end_pos, 120000);
    });

    socket.on('new_log', (data) => {
        const list = document.getElementById('log-list');
        const item = document.createElement('div');
        item.className = 'log-entry';
        item.innerHTML = `<small style="color:#718096">${data.time} | ${data.chat}</small><br>${data.text}`;
        list.insertBefore(item, list.firstChild);
    });
</script>
</body>
</html>
